<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Embed SDK Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #2d2d2d; color: #ccc; font-family: sans-serif; }
    #app { width: 100vw; height: 100vh; }
    .host-content { padding: 20px; }
    .host-content h1 { font-size: 18px; margin-bottom: 10px; }
    .host-content p { font-size: 14px; color: #999; }
  </style>
</head>
<body>
  <div id="app">
    <div class="host-content">
      <h1>Host Application</h1>
      <p>This content should be moved into the slot by the SDK.</p>
    </div>
  </div>

  <script src="http://localhost:4000/embed.js"></script>
  <script>
    ClaudeEmbed.init({
      serverUrl: 'http://localhost:4000',
      cwd: 'E:/projects/claude-agent-ui',
      container: '#app',
    })
  </script>
</body>
</html>
