<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Speech API 检测</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, system-ui, sans-serif; background:#1a1a2e; color:#e0e0e0; padding:20px; min-height:100vh; }
  h1 { font-size:20px; margin-bottom:16px; }
  .test { background:#252540; border-radius:12px; padding:16px; margin-bottom:12px; }
  .test-title { font-size:14px; color:#888; margin-bottom:8px; }
  .test-result { font-size:16px; font-weight:600; }
  .pass { color:#22c55e; }
  .fail { color:#ef4444; }
  .warn { color:#f59e0b; }
  .info { color:#6366f1; }
  button { background:#6366f1; color:white; border:none; border-radius:8px; padding:12px 24px; font-size:16px; cursor:pointer; width:100%; margin-top:16px; }
  button:active { background:#4f46e5; }
  button:disabled { background:#333; color:#666; }
  #transcript { background:#1e1e3a; border-radius:8px; padding:12px; margin-top:12px; min-height:60px; font-family:monospace; font-size:14px; white-space:pre-wrap; }
  .log { font-size:12px; color:#666; margin-top:4px; font-family:monospace; }
</style>
</head>
<body>
<h1>Web Speech API 可用性检测</h1>

<div class="test" id="test-api">
  <div class="test-title">1. SpeechRecognition API 是否存在</div>
  <div class="test-result" id="result-api">检测中...</div>
</div>

<div class="test" id="test-mic">
  <div class="test-title">2. 麦克风权限 (getUserMedia)</div>
  <div class="test-result" id="result-mic">等待测试...</div>
</div>

<div class="test" id="test-stt">
  <div class="test-title">3. STT 服务连通性（关键！测试 Google 服务器是否可达）</div>
  <div class="test-result" id="result-stt">等待测试...</div>
  <div class="log" id="stt-log"></div>
</div>

<div class="test" id="test-audio">
  <div class="test-title">4. AudioContext (波形可视化)</div>
  <div class="test-result" id="result-audio">等待测试...</div>
</div>

<button id="startBtn" onclick="runAllTests()">开始全部检测</button>

<div id="transcript" style="display:none;">
  <div style="color:#888;font-size:12px;margin-bottom:4px;">识别结果：</div>
  <div id="transcriptText"></div>
</div>

<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function setResult(id, text, cls) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'test-result ' + cls;
}

function addLog(text) {
  const el = document.getElementById('stt-log');
  el.textContent += text + '\n';
}

async function runAllTests() {
  document.getElementById('startBtn').disabled = true;
  document.getElementById('startBtn').textContent = '检测中...';

  // Test 1: API 存在性
  if (SpeechRecognition) {
    setResult('result-api', '✅ 支持 — ' + (window.SpeechRecognition ? 'SpeechRecognition' : 'webkitSpeechRecognition'), 'pass');
  } else {
    setResult('result-api', '❌ 不支持 — 此浏览器没有 SpeechRecognition API', 'fail');
    document.getElementById('startBtn').textContent = '检测完成';
    return;
  }

  // Test 2: 麦克风
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    setResult('result-mic', '✅ 已授权', 'pass');

    // Test 4: AudioContext
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const source = ctx.createMediaStreamSource(stream);
      const analyser = ctx.createAnalyser();
      source.connect(analyser);
      setResult('result-audio', '✅ AudioContext + AnalyserNode 正常', 'pass');
      ctx.close();
    } catch(e) {
      setResult('result-audio', '❌ ' + e.message, 'fail');
    }

    // Test 3: STT 连通性（核心测试）
    setResult('result-stt', '⏳ 正在测试... 请对着麦克风说几句话', 'warn');
    addLog('[' + new Date().toLocaleTimeString() + '] 创建 SpeechRecognition 实例');

    const recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'zh-CN';
    recognition.maxAlternatives = 1;

    let gotResult = false;
    let startTime = Date.now();
    const transcript = document.getElementById('transcript');
    const transcriptText = document.getElementById('transcriptText');

    recognition.onstart = () => {
      addLog('[' + new Date().toLocaleTimeString() + '] recognition.onstart — 开始监听');
    };

    recognition.onaudiostart = () => {
      addLog('[' + new Date().toLocaleTimeString() + '] onaudiostart — 音频流已连接');
    };

    recognition.onspeechstart = () => {
      addLog('[' + new Date().toLocaleTimeString() + '] onspeechstart — 检测到语音');
    };

    recognition.onresult = (event) => {
      gotResult = true;
      let interim = '', final = '';
      for (let i = 0; i < event.results.length; i++) {
        if (event.results[i].isFinal) {
          final += event.results[i][0].transcript;
        } else {
          interim += event.results[i][0].transcript;
        }
      }
      transcript.style.display = 'block';
      transcriptText.innerHTML = (final ? '<span style="color:#22c55e">' + final + '</span>' : '') +
                                  (interim ? '<span style="color:#f59e0b">' + interim + '</span>' : '');
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
      addLog('[' + new Date().toLocaleTimeString() + '] onresult — ' + (final || interim) + ' (' + elapsed + 's)');
    };

    recognition.onend = () => {
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
      addLog('[' + new Date().toLocaleTimeString() + '] onend — 识别结束 (' + elapsed + 's)');
      if (gotResult) {
        setResult('result-stt', '✅ STT 服务正常 — Google 服务器可达，识别成功', 'pass');
      } else {
        setResult('result-stt', '⚠️ 未检测到语音 — 服务可能可用但没有说话，或网络超时', 'warn');
      }
      stream.getTracks().forEach(t => t.stop());
      document.getElementById('startBtn').disabled = false;
      document.getElementById('startBtn').textContent = '重新检测';
    };

    recognition.onerror = (event) => {
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
      addLog('[' + new Date().toLocaleTimeString() + '] onerror — ' + event.error + ' (' + elapsed + 's)');
      if (event.error === 'network') {
        setResult('result-stt', '❌ 网络错误 — 无法连接 Google STT 服务（被墙或无网络）', 'fail');
      } else if (event.error === 'not-allowed') {
        setResult('result-stt', '❌ 麦克风权限被拒绝', 'fail');
      } else if (event.error === 'no-speech') {
        setResult('result-stt', '⚠️ 未检测到语音 — 服务可连接但没收到语音输入', 'warn');
      } else if (event.error === 'service-not-allowed') {
        setResult('result-stt', '❌ 服务不可用 — 浏览器禁止了语音识别服务', 'fail');
      } else if (event.error === 'aborted') {
        setResult('result-stt', '⚠️ 识别被中断', 'warn');
      } else {
        setResult('result-stt', '❌ 错误: ' + event.error, 'fail');
      }
      stream.getTracks().forEach(t => t.stop());
      document.getElementById('startBtn').disabled = false;
      document.getElementById('startBtn').textContent = '重新检测';
    };

    recognition.start();

    // 10 秒超时
    setTimeout(() => {
      if (!gotResult) {
        try { recognition.stop(); } catch(e) {}
      }
    }, 10000);

  } catch(e) {
    if (e.name === 'NotAllowedError') {
      setResult('result-mic', '❌ 用户拒绝了麦克风权限', 'fail');
    } else {
      setResult('result-mic', '❌ ' + e.message, 'fail');
    }
    document.getElementById('startBtn').disabled = false;
    document.getElementById('startBtn').textContent = '重新检测';
  }
}
</script>
</body>
</html>
